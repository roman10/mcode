<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16103A"/>
      <stop offset="100%" stop-color="#0A0818"/>
    </linearGradient>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B7FFF"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg1)"/>

  <!-- Ghost tiles: inactive grid positions (very low opacity) -->
  <!-- Row 0 -->
  <rect x="140" y="60" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="220" y="60" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="300" y="60" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <!-- Row 1 -->
  <rect x="220" y="140" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <!-- Row 2 -->
  <rect x="140" y="220" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="300" y="220" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <!-- Row 3 -->
  <rect x="140" y="300" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="220" y="300" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="300" y="300" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <!-- Row 4 -->
  <rect x="140" y="380" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="220" y="380" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>
  <rect x="300" y="380" width="72" height="72" rx="10" fill="#7C3AED" opacity="0.07"/>

  <!-- Active M tiles -->
  <!-- Row 0: left & right pillars -->
  <rect x="60"  y="60"  width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <rect x="380" y="60"  width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <!-- Row 1: outer pillars + inner shoulders (inner brighter) -->
  <rect x="60"  y="140" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <rect x="140" y="140" width="72" height="72" rx="10" fill="#A78BFA"/>
  <rect x="300" y="140" width="72" height="72" rx="10" fill="#A78BFA"/>
  <rect x="380" y="140" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <!-- Row 2: outer pillars + center peak (brightest) -->
  <rect x="60"  y="220" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <rect x="220" y="220" width="72" height="72" rx="10" fill="#C4B5FD"/>
  <rect x="380" y="220" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <!-- Row 3: outer pillars only -->
  <rect x="60"  y="300" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <rect x="380" y="300" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <!-- Row 4: outer pillars only -->
  <rect x="60"  y="380" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
  <rect x="380" y="380" width="72" height="72" rx="10" fill="url(#tileGrad)"/>
</svg>
