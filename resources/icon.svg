<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- macOS squircle clip path (approximation using superellipse-like rounded rect) -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

    <!-- Tile gradients -->
    <linearGradient id="blue-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="teal-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>

    <linearGradient id="amber-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="#0F1419"/>

    <!--
      Tile grid layout (asymmetric 2x2):
      Content area: x=100 to x=924 (824px wide), y=100 to y=924 (824px tall)
      Gap: 24px

      Top row height: ~380px (46%)
      Bottom row height: ~420px (48%) — with 24px gap between rows

      Left col width: ~310px (38%)
      Right col width: ~490px (56%) — with 24px gap between cols

      Top-left:     x=100, y=100,  w=310, h=380
      Top-right:    x=434, y=100,  w=490, h=380
      Bottom-left:  x=100, y=504,  w=490, h=420
      Bottom-right: x=614, y=504,  w=310, h=420
    -->

    <!-- Tile 1: Top-left (blue, with cursor) -->
    <rect x="100" y="100" width="310" height="380" rx="32" ry="32" fill="url(#blue-grad)"/>

    <!-- Terminal cursor in top-left tile -->
    <rect x="168" y="240" width="16" height="80" rx="4" ry="4" fill="#FFFFFF" opacity="0.9"/>

    <!-- Tile 2: Top-right (teal) -->
    <rect x="434" y="100" width="490" height="380" rx="32" ry="32" fill="url(#teal-grad)"/>

    <!-- Tile 3: Bottom-left (amber) -->
    <rect x="100" y="504" width="490" height="420" rx="32" ry="32" fill="url(#amber-grad)"/>

    <!-- Tile 4: Bottom-right (muted/dim) -->
    <rect x="614" y="504" width="310" height="420" rx="32" ry="32" fill="#1E293B"/>
  </g>
</svg>
